name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "/usr/local/lib/android/sdk/platform-tools" >> $GITHUB_PATH

      - name: Create local.properties
        run: |
          echo "sdk.dir=/usr/local/lib/android/sdk" > android/local.properties
          cat android/local.properties

      - name: Sync web assets to Android
        run: |
          mkdir -p android/app/src/main/assets/public
          cp -r dist/* android/app/src/main/assets/public/
          cp capacitor.config.json android/app/src/main/assets/

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Check APK output
        run: |
          echo "=== Searching for APK files ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK found"
          echo "=== Check android/app/build ==="
          ls -la android/app/build/outputs/apk/ 2>/dev/null || echo "No apk dir"
          ls -la android/app/build/outputs/ 2>/dev/null || echo "No outputs dir"
          ls -la android/app/build/ 2>/dev/null || echo "No build dir"
          ls -la android/build/ 2>/dev/null || echo "No root build dir"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ChainHunter-APK
          path: |
            android/app/build/outputs/apk/**/*.apk
            **/*.apk
          if-no-files-found: warn
