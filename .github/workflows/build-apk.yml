name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  NODE_VERSION: '22'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "/usr/local/lib/android/sdk/platform-tools" >> $GITHUB_PATH

          # Find actual cmdline-tools path
          SDK_CMDLINE_TOOLS=""
          if [ -d "/usr/local/lib/android/sdk/cmdline-tools/latest" ]; then
            SDK_CMDLINE_TOOLS="/usr/local/lib/android/sdk/cmdline-tools/latest"
          elif [ -d "/usr/local/lib/android/sdk/cmdline-tools" ]; then
            SDK_CMDLINE_TOOLS=$(find /usr/local/lib/android/sdk/cmdline-tools -maxdepth 1 -type d -name "*" | sort | tail -1)
          fi

          if [ -n "$SDK_CMDLINE_TOOLS" ] && [ -f "$SDK_CMDLINE_TOOLS/bin/sdkmanager" ]; then
            yes | $SDK_CMDLINE_TOOLS/bin/sdkmanager --licenses 2>&1 || true
            $SDK_CMDLINE_TOOLS/bin/sdkmanager "platforms;android-35" "build-tools;35.0.0" 2>&1 || true
          else
            echo "SDK cmdline-tools not found, skipping license acceptance"
          fi

          echo "sdk.dir=/usr/local/lib/android/sdk" > android/local.properties
          echo "SDK setup done"

      - name: Sync web assets to Android
        run: |
          mkdir -p android/app/src/main/assets/public
          cp -r dist/* android/app/src/main/assets/public/
          cp capacitor.config.json android/app/src/main/assets/

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ChainHunter-APK
          path: android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
