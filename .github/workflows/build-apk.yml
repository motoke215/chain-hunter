name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android environment
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV

      - name: Sync web assets to Android
        run: |
          mkdir -p android/app/src/main/assets/public
          cp -r dist/* android/app/src/main/assets/public/
          cp capacitor.config.json android/app/src/main/assets/
          echo "Assets synced successfully"

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: List APK files
        run: |
          echo "Looking for APK files..."
          find android/app/build/outputs -name "*.apk" 2>/dev/null || echo "No APK found"
          ls -la android/app/build/outputs/apk/debug/ 2>/dev/null || echo "Debug dir not found"
          ls -la android/app/build/outputs/apk/ 2>/dev/null || echo "APK dir not found"
          ls -la android/app/build/outputs/ 2>/dev/null || echo "Outputs dir not found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ChainHunter-APK
          path: android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
